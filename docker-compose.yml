services:
  mysql:
    image: mysql:8.4
    container_name: nexus-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: neuroforge_nexus
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - nexus-mysql-data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: nexus-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    volumes:
      - ./docs/keycloak:/opt/keycloak/data/import

  # Uncomment once the backend image is built (see backend/README section on
  # `mvn clean package` + `docker build`), or run the backend locally via
  # `mvn spring-boot:run` while developing.
  # backend:
  #   build: ./backend
  #   container_name: nexus-backend
  #   depends_on:
  #     mysql:
  #       condition: service_healthy
  #     keycloak:
  #       condition: service_started
  #   environment:
  #     DB_HOST: mysql
  #     DB_USERNAME: root
  #     DB_PASSWORD: root
  #     KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/neuroforge-nexus
  #     CORS_ALLOWED_ORIGINS: http://localhost:5173
  #   ports:
  #     - "8080:8080"

volumes:
  nexus-mysql-data:
