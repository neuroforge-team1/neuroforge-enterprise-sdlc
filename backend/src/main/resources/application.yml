spring:
  application:
    name: nexus-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:neuroforge_nexus}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}   # use 'validate' once Flyway/Liquibase owns schema changes
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true

  jackson:
    deserialization:
      fail-on-unknown-properties: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/neuroforge-nexus}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Separate from spring.security.oauth2.resourceserver above — that config
# only validates incoming tokens. These credentials belong to a *second*,
# confidential Keycloak client used solely for the admin "sync users"
# feature (POST /api/users/sync). Create a client with service accounts
# enabled and grant its service account the realm-management "view-users"
# role, then set these two env vars. Sync will fail with a clear error if
# they're missing or wrong — nothing silently no-ops.
keycloak:
  admin:
    server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8081}
    realm: ${KEYCLOAK_REALM:neuroforge-nexus}
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:nexus-admin-sync}
    client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
